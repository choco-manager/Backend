name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 7.0.x
    - name: Restore dependencies
      run: dotnet restore Backend\Backend.Tests.Unit\Backend.Tests.Unit.csproj
    - name: Build
      run: dotnet build --no-restore Backend\Backend.Tests.Unit\Backend.Tests.Unit.csproj
    - name: Test
      run: dotnet test --no-build --verbosity normal Backend\Backend.Tests.Unit\Backend.Tests.Unit.csproj