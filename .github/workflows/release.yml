name: "Publish Release"

on:
  push:
    branches: ["release"]

jobs:
  createTag:
    name: "Publish release"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v3
      - name: "Install XPath engine"
        run: "sudo apt install xmlstarlet -y"
      - name: "Extract version number from tag"
        id: version-extractor
        run: |
          "export VERSION=$(xmlstarlet sel -t -m '//Version[1]' -v . -n < Backend/Backend.csproj)"
          echo "VERSION=$VERSION >> $GITHUB_OUTPUT"
      - name: Create tag
        uses: rickstaa/action-create-tag@v1
        id: "tag_create"
        with:
          tag: ${{ steps.version-extractor.outputs.VERSION }}
          message: "Release ${{ steps.version-extractor.outputs.VERSION }}"
      - name: Generate Changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: ".github/changelog-generator.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "v${{ steps.version-extractor.outputs.VERSION }}"
          prerelease: false
          title: "Релиз v${{ steps.version-extractor.outputs.VERSION }}"
          body_path: CHANGELOG.md
